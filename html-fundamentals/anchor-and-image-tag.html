<!DOCTYPE html>
<html>

<head>
    <title>Anchor tag</title>
    <!-- comment the base tag while linking between same doc/images if the base is not same for all links -->
    <base href="../html-fundamentals/">
</head>

<body>

    <h1>This document demonstrates anchor tag usage in HTML.</h1>
    <p id="section1">
        <h3>Example:</h3>
        <p>
            <a href="https://www.google.com">Open Google in the same tab</a>
        </p>
        <p>
            <a href="https://www.google.com" target="_blank">Open Google in a new tab</a>
        </p>
        <p>
            <a href="lists.html" target="_blank">Open Lists page in a new tab</a>
        </p>
        <p>
            <h4>Image as link: </h4>
            <a href="" target="_blank">
               <img src="../assets/images/html-logo.png" alt="Anchor tag image" width="200" height="200">    
            </a>
        </p>
