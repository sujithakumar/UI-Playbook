<!DOCTYPE html>
<html>

<head>
    <title>Lists</title>
</head>

<body>
    <p>
    <h3>Ordered Lists</h3>
    <ol start="3" type="A">
        <li>Plan</li>
        <li>Design</li>
        <li>Develop</li>
        <li>Test</li>
    </ol>
    </p>
    <p>
    <h3>Un-Ordered Lists</h3>
    <ul type="square">
        <li>HTML</li>
        <li>CSS</li>
        <li>Accessibility</li>
    </ul>
    </p>
    <p>
    <h3>Definition Lists</h3>
    <dl>
        <dt>HTML</dt>
        <dd>Defines the structure of web pages.</dd>

        <dt>CSS</dt>
        <dd>Defines the presentation and styling of web pages.</dd>
    </dl>
    </p>

</body>

</html>
