<!DOCTYPE html>
<html>

<head>
    <title>No-Script Tag</title>
    <base href="../assets/" >
</head>

<body>

    <h1>Noscript tag</h1>
    <p>
        The <code>&lt;noscript&gt;</code> tag defines a section of HTML to be inserted if the client does not support
        script or has script disabled.
    </p>
    <h3>Example:</h3>
    <noscript>
        <p>
            This application requires JavaScript to be enabled.
        </p>
    </noscript>

    <main>
        Application content
    </main>
</body>

</html>
